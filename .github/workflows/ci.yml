name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Check localization
        run: python3 scripts/check-l10n.py

      - name: Check version metadata
        run: python3 scripts/check-version.py
